{% extends "base.html" %}

{% block content %}
<div id="progress-bar">
    <div id="progress-fill"></div>
</div>
<div id="progress"></div>

<h1 id="question"></h1>

<div id="result"></div>

<!-- 難易度が "かんたん" の場合 -->
<div id="choices-area">
    <button class="choice"></button>
    <button class="choice"></button>
    <button class="choice"></button>
    <button class="choice"></button>
</div>


<!-- 難易度が "ふつう" or "むずかしい" の場合 -->
<div id="input-area" style="display:none;">

    <div id="input-int-dec">
        <input id="answer-input" class="big-input" >
    </div>

    <div id="input-fraction" style="display:none;">
        <span class="fraction">
            <span><input id="num" class="big-input" ></span>
            <span><input id="den" class="big-input" ></span>
        </span>
    </div>

    <div id="input-remain" style="display:none;">
        <input id="q" class="big-input" > あまり <input id="r" class="big-input" >
    </div>

    <button onclick="submitAnswer()">こたえ</button>

</div>

<script src="/static/app.js"></script>

{% endblock %}
